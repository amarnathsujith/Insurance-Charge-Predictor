<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Insurance Cost Predictor | Trusted Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #1a56db;
            --primary-hover: #1e429f;
            --secondary: #6b7280;
            --background: #f3f4f6;
            --surface: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 0.75rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
            background-color: #fafafa;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
            background-color: #fff;
        }

        button {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: var(--secondary);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .result-card {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f1f5f9;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        #resultValue {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .trust-badge {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0.6;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <i data-lucide="shield-check" size="32"></i>
            </div>
            <h2>Insurance Cost Predictor</h2>
            <p class="subtitle">Enter your details for an accurate charge estimation.</p>
        </header>

        <form id="predictForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" value="30" placeholder="e.g. 25">
                </div>
                <div class="form-group">
                    <label for="sex">Gender</label>
                    <select id="sex">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bmi">BMI</label>
                    <input type="number" id="bmi" step="0.1" value="25.5" placeholder="e.g. 22.0">
                </div>
                <div class="form-group">
                    <label for="children">Children</label>
                    <input type="number" id="children" value="0" placeholder="Number of dependents">
                </div>
                <div class="form-group">
                    <label for="smoker">Smoker Status</label>
                    <select id="smoker">
                        <option value="no">Non-smoker</option>
                        <option value="yes">Smoker</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="region">Region</label>
                    <select id="region">
                        <option value="southwest">Southwest</option>
                        <option value="southeast">Southeast</option>
                        <option value="northwest">Northwest</option>
                        <option value="northeast">Northeast</option>
                    </select>
                </div>
            </div>

            <button type="button" id="predictBtn" onclick="makePrediction()">
                <div class="spinner" id="btnSpinner"></div>
                <span id="btnText">Calculate Estimation</span>
            </button>
        </form>

        <div class="result-card" id="resultCard">
            <div class="result-label">Estimated Annual Charges</div>
            <div id="resultValue">$0.00</div>
        </div>

        <div class="trust-badge">
            <div class="badge-item">
                <i data-lucide="lock" size="14"></i>
                Secure Data
            </div>
            <div class="badge-item">
                <i data-lucide="info" size="14"></i>
                Free Analysis
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        async function makePrediction() {
            const API_URL = 'https://endurable-eternal-yearning.ngrok-free.dev/predict'; 
            const btn = document.getElementById('predictBtn');
            const spinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const resultCard = document.getElementById('resultCard');
            const resultValue = document.getElementById('resultValue');

            // UI Feedback
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Calculating...';
            resultCard.style.display = 'none';
            
            const data = {
                age: parseInt(document.getElementById('age').value),
                sex: document.getElementById('sex').value,
                bmi: parseFloat(document.getElementById('bmi').value),
                children: parseInt(document.getElementById('children').value),
                smoker: document.getElementById('smoker').value,
                region: document.getElementById('region').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('Prediction service unavailable');

                const result = await response.json();
                
                // Show result with animation
                resultValue.innerText = '$' + result.estimated_charges.toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
                resultCard.style.display = 'block';
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'Calculate Estimation';
            }
        }
    </script>
</body>
</html>
